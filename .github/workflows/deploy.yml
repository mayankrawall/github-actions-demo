name: Deploying Directly via Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup and Deploy
        run: |
          mkdir -p "$HOME/skillpulse"
          cd "$HOME/skillpulse"


          if [ ! -d ".git" ]; then
            git clone https://github.com/mayankrawall/github-actions-demo.git .
          else
            git pull origin main
          fi


          if [ ! -f .env ]; then
            echo "DOCKERHUB_USERNAME=${{ secrets.Dockerhub_USERNAME }}" > .env
          fi


          docker-compose pull
          docker-compose up -d --remove-orphans
