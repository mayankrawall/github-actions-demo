- name: Deploying Directly via Self-Hosted Runner
        run: |
          mkdir -p "$HOME/skillpulse"
          cd "$HOME/skillpulse"

          
          if [ ! -d ".git" ]; then
            git clone https://github.com/mayankrawall/github-actions-demo.git .
          else
            git pull origin main
          fi
          
          if [ ! -f .env ]; then
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          fi
          docker-compose pull
          docker-compose up -d --remove-orphans
