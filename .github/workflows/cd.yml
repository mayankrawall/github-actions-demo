name: CD Workflow

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Git pull ki jagah ye official step lagayein jo automatic auth handle karega
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploying Directly via Self-Hosted Runner
        run: |
          mkdir -p "$HOME/skillpulse"
          
          # Pure folder ko fresh sync karne ke liye (bina git pull ke jhanjhat ke)
          rsync -avz --exclude '.git' ./ "$HOME/skillpulse/"
          
          cd "$HOME/skillpulse"
          if [ ! -f .env ]; then
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          fi
          
          docker compose down --remove-orphans
          sudo fuser -k 3000/tcp || true
          docker compose up -d --build
