version: '3.8'

services:
  backend:
    image: go-backend:latest
    build: ./backend
    restart: always
    environment:
      - DB_HOST=database
      - DB_USER=rootuser
      - DB_PASSWORD=2002
      - DB_NAME=skillpulse
    depends_on:
      - database

  frontend:
    image: nginx-frontend:latest
    build: ./frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  database:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=2002
      - MYSQL_DATABASE=skillpulse
      - MYSQL_USER=rootuser
      - MYSQL_PASSWORD=2002
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$2002"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
